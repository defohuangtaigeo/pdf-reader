<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>語音書 — AI 高品質朗讀</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
:root{--bg:#0b1120;--card:#162033;--accent:#10b981;--text:#e2e8f0;--muted:#64748b;--zh-color:#fbbf24;--en-color:#60a5fa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
.container{max-width:520px;margin:0 auto;padding:14px;min-height:100dvh}
h1{font-size:20px;font-weight:800;text-align:center;padding:10px 0 2px;color:#f1f5f9;letter-spacing:1px}
.sub{text-align:center;font-size:10px;color:var(--muted);margin-bottom:12px}
/* Bookshelf */
.bookshelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:10px 0 16px}
.book-card{background:var(--card);border-radius:12px;padding:12px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.book-card:active{transform:scale(.97)}
.book-card .icon{font-size:32px;color:var(--accent);text-align:center;margin-bottom:6px}
.book-card .title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.book-card .meta{font-size:9px;color:var(--muted)}
.book-card .progress-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--accent)}
.book-card .source-badge{font-size:8px;background:#1e3a5f;border-radius:10px;padding:1px 6px;display:inline-block}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--card);border-radius:12px;padding:3px}
.tab{flex:1;text-align:center;padding:8px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;color:var(--muted)}
.tab.active{background:var(--accent);color:#fff}
/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:10px}
.toolbar button{flex:1;background:var(--card);border:none;border-radius:10px;padding:12px 8px;color:var(--text);font-size:11px;font-weight:600;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.toolbar button i{font-size:18px;color:var(--accent)}
.toolbar button:active{background:#1e3a5f}
/* Settings panel */
.settings-toggle{display:flex;justify-content:center;margin-bottom:4px}
.settings-toggle button{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:4px 12px;border-radius:8px}
.settings-toggle button:hover{color:var(--text);background:var(--card)}
.settings-panel{background:var(--card);border-radius:12px;padding:12px;margin-bottom:10px;display:none}
.settings-panel.show{display:block}
.settings-panel .row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px}
.settings-panel .row input[type=text]{background:#0b1120;border:1px solid #334155;border-radius:6px;padding:6px 8px;color:var(--text);font-size:11px;width:220px;outline:none}
.settings-panel .row input[type=text]:focus{border-color:var(--accent)}
.settings-panel .row select{background:#0b1120;border:1px solid #334155;border-radius:6px;padding:4px 6px;color:var(--text);font-size:11px;cursor:pointer;outline:none}
.settings-panel .row label{color:var(--muted);min-width:80px}
.settings-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:10px;cursor:pointer}
.settings-btn.outline{background:transparent;border:1px solid #334155;color:var(--text)}
/* Player (existing style adapted) */
.voice-panel{background:var(--card);border-radius:12px;padding:10px;margin:6px 0;font-size:11px}
.voice-panel .row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.voice-panel .lang{color:var(--muted);min-width:50px}
.voice-panel select{background:#0b1120;color:var(--text);border:1px solid #334155;border-radius:6px;padding:3px 5px;font-size:10px;max-width:180px;outline:none;cursor:pointer}
.controls{background:var(--card);border-radius:16px;padding:14px;margin:6px 0}
.progress-container{height:5px;background:#334155;border-radius:3px;margin-bottom:10px;cursor:pointer}
.progress-bar{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .2s}
.progress-text{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:6px}
.main-btn-row{display:flex;justify-content:center;gap:14px;margin:8px 0}
.main-btn{border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.play-btn{background:var(--accent);color:#fff;width:68px;height:68px;font-size:26px}
.play-btn:hover{transform:scale(1.05)}
.ctrl-btn{background:#334155;color:var(--text);width:48px;height:48px;font-size:14px}
.speed-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 0;font-size:11px}
.speed-row input[type=range]{width:90px;accent-color:var(--accent)}
.speed-val{font-weight:700;color:var(--accent);min-width:28px;text-align:center}
.text-display{background:var(--card);border-radius:12px;padding:12px;margin:6px 0;flex:1;overflow-y:auto;max-height:280px;font-size:12px;line-height:1.6}
.text-display .para{margin-bottom:5px}
.text-display .para.active{background:rgba(16,185,129,.1);border-radius:4px;padding:4px;margin:0 -4px}
.text-display .zh-text{color:var(--zh-color)}
.text-display .en-text{color:var(--en-color)}
.text-display .sub-chunk.speaking-chunk{background:rgba(16,185,129,.2);border-radius:2px}
.status-text{text-align:center;font-size:11px;color:var(--muted);padding:4px;min-height:20px}
.file-info{background:var(--card);border-radius:12px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.file-info i{font-size:18px;color:var(--accent)}
.file-info .name{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.back-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:4px 8px;border-radius:8px}
.back-btn:hover{background:var(--card);color:var(--text)}
.upload-zone{border:2px dashed #334155;border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:.3s;background:var(--card);margin-bottom:8px}
.upload-zone:hover,.upload-zone.active{border-color:var(--accent);background:rgba(16,185,129,.06)}
.upload-zone i{font-size:30px;color:var(--muted);margin-bottom:6px}
.upload-zone .label{font-size:12px;font-weight:600}
.upload-zone .hint{font-size:10px;color:var(--muted);margin-top:3px}
.loading-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(11,17,32,.88);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.loading-overlay.show{display:flex}
.loading-overlay i{font-size:32px;color:var(--accent);animation:spin 1s linear infinite}
.loading-overlay .msg{font-size:12px;color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}
.wake-badge{display:inline-flex;align-items:center;gap:3px;background:#1e293b;border-radius:20px;padding:2px 8px;font-size:9px;color:var(--muted);border:1px solid #334155}
.wake-badge.active{color:var(--accent);border-color:var(--accent)}
.engine-badge{font-size:9px;padding:2px 8px;border-radius:10px}
.engine-badge.ai{background:#1e3a5f;color:#93c5fd}
.engine-badge.browser{background:#3f1e1e;color:#fca5a5}
#fileInput{display:none}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <i class="fas fa-spinner"></i>
  <div class="msg" id="loadingMsg">載入中...</div>
</div>

<div class="container" id="app">

<!-- ============ HEADER ============ -->
<h1><i class="fas fa-headphones mr-1" style="color:var(--accent)"></i>語音書</h1>
<div class="sub">AI 高品質朗讀 · 中英自動切換人聲</div>

<!-- ============ SETTINGS ============ -->
<div class="settings-toggle">
  <button onclick="toggleSettings()"><i class="fas fa-cog mr-1"></i>設定</button>
</div>
<div class="settings-panel" id="settingsPanel">
  <div class="row">
    <label>朗讀引擎</label>
    <select id="ttsEngine" onchange="onEngineChange()">
      <option value="openai">🤖 AI Premium (OpenAI)</option>
      <option value="browser">📱 瀏覽器內建</option>
    </select>
  </div>
  <div class="row" id="openaiKeyRow">
    <label>OpenAI Key</label>
    <input type="text" id="openaiKeyInput" placeholder="sk-..." value="" onchange="saveOpenAIKey()">
  </div>
  <div class="row">
    <label>中文人聲</label>
    <select id="openaiVoiceZh">
      <option value="nova">Nova (溫暖女聲)</option>
      <option value="shimmer">Shimmer (柔和女聲)</option>
      <option value="alloy">Alloy (中性)</option>
      <option value="echo">Echo (沉穩男聲)</option>
      <option value="fable">Fable (英式)</option>
    </select>
  </div>
  <div class="row">
    <label>英文人聲</label>
    <select id="openaiVoiceEn">
      <option value="shimmer">Shimmer (柔和女聲)</option>
      <option value="nova">Nova (溫暖女聲)</option>
      <option value="alloy">Alloy (中性)</option>
      <option value="echo">Echo (沉穩男聲)</option>
      <option value="fable">Fable (英式)</option>
    </select>
  </div>
  <div class="row">
    <label>預設來源</label>
    <select id="defaultSource">
      <option value="picker">📂 檔案選擇器</option>
      <option value="gdrive">☁️ Google Drive</option>
    </select>
  </div>
  <div class="row">
    <label>Google API Key</label>
    <input type="text" id="googleApiKey" placeholder="可選: 用於 Drive Picker" value="">
  </div>
  <div style="text-align:right;margin-top:6px">
    <button class="settings-btn outline" onclick="clearLibrary()">🗑 清空書庫</button>
  </div>
</div>

<!-- ============ BOOKSHELF VIEW ============ -->
<div id="bookshelfView">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('books')" id="tabBooks">📚 書庫</div>
    <div class="tab" onclick="switchTab('drive')" id="tabDrive">☁️ Google Drive</div>
  </div>

  <div class="toolbar">
    <button onclick="addFromFile()"><i class="fas fa-file-upload"></i>從檔案</button>
    <button onclick="addFromUrl()"><i class="fas fa-link"></i>從連結</button>
    <button onclick="openDrivePicker()" id="driveBtn"><i class="fab fa-google-drive"></i>Google Drive</button>
  </div>

  <div id="booksContent">
    <div id="emptyLibrary" style="text-align:center;padding:40px 20px;color:var(--muted);font-size:13px">
      <i class="fas fa-book-open" style="font-size:40px;margin-bottom:10px;color:#334155"></i>
      <div>書庫是空的</div>
      <div style="font-size:11px;margin-top:4px">點擊上方按鈕加入 PDF</div>
    </div>
    <div class="bookshelf" id="bookshelf"></div>
  </div>

  <div id="driveContent" style="display:none">
    <div style="text-align:center;padding:30px;color:var(--muted);font-size:12px">
      <i class="fab fa-google-drive" style="font-size:36px;margin-bottom:8px;color:#4285F4"></i>
      <div>瀏覽 Google Drive 中的 PDF</div>
      <button class="settings-btn" style="margin-top:10px;padding:8px 20px;font-size:12px" onclick="openDrivePicker()">
        <i class="fab fa-google-drive mr-1"></i>開啟 Google Drive
      </button>
      <div style="margin-top:20px;font-size:10px;padding:12px;background:var(--card);border-radius:8px">
        <div style="font-weight:600;margin-bottom:4px">⚙ 設定方式</div>
        <div>1. 前往 <a href="https://console.cloud.google.com/" target="_blank" style="color:var(--accent)">Google Cloud Console</a></div>
        <div>2. 啟用 Google Drive API</div>
        <div>3. 建立 API Key → 貼入設定</div>
        <div style="margin-top:6px">或直接<a href="#" onclick="addFromUrl()" style="color:var(--accent)">貼上分享連結</a></div>
      </div>
    </div>
  </div>
</div>

<!-- ============ PLAYER VIEW ============ -->
<div id="playerView" style="display:none">
  <div class="file-info">
    <button class="back-btn" onclick="showBookshelf()"><i class="fas fa-arrow-left"></i></button>
    <div><div class="name" id="fileName"></div></div>
    <span class="engine-badge" id="engineBadge">🤖 AI</span>
  </div>

  <div class="voice-panel" id="voicePanel">
    <div class="row"><span class="lang">🇹🇼 中文</span><span class="name" id="voiceZhDisplay">Nova</span></div>
    <div class="row"><span class="lang">🇺🇸 英文</span><span class="name" id="voiceEnDisplay">Shimmer</span></div>
  </div>

  <div class="controls">
    <div class="progress-container" id="progressContainer" onclick="seekProgress(event)">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text">
      <span id="currentPos">第 1 段 / 共 0 段</span>
      <span id="timeRemain">--:--</span>
    </div>
    <div class="main-btn-row">
      <button class="main-btn ctrl-btn" onclick="prevSegment()"><i class="fas fa-backward-step"></i></button>
      <button class="main-btn play-btn" id="playBtn" onclick="togglePlay()"><i class="fas fa-play" id="playIcon"></i></button>
      <button class="main-btn ctrl-btn" onclick="nextSegment()"><i class="fas fa-forward-step"></i></button>
    </div>
    <div class="speed-row">
      <span style="color:var(--muted)">慢</span>
      <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.0" oninput="onSpeedChange()">
      <span style="color:var(--muted)">快</span>
      <span class="speed-val" id="speedDisplay">1.0×</span>
    </div>
    <div class="flex justify-center gap-3 pt-1">
      <span class="wake-badge" id="wakeLockBadge"><i class="fas fa-moon"></i> 螢幕不滅</span>
    </div>
  </div>

  <div class="status-text" id="statusText">就緒</div>
  <div class="text-display" id="textDisplay"><div id="textContent"></div></div>
</div>

</div>

<input type="file" id="fileInput" accept=".pdf" multiple>
<input type="file" id="folderInput" webkitdirectory style="display:none">

<script>
// ═══════════════════════════════════════════════════════════════
//  CONSTS & STATE
// ═══════════════════════════════════════════════════════════════
const DB_NAME = 'VoiceBookDB';
const DB_VER = 1;
const SYNTH = window.speechSynthesis;

let state = {
  segments: [],
  currentIdx: 0,
  chunkQueue: [],
  chunkIdx: 0,
  isPlaying: false,
  speed: 1.0,
  pdfName: '',
  pdfBytes: null,
  pdfId: null,
  voices: { zh: null, en: null },
  wakeLock: null,
  ttsEngine: 'openai',
  openaiKey: '',
  openaiVoiceZh: 'nova',
  openaiVoiceEn: 'shimmer',
};
let utterance = null;
let ttsWatchdog = null;
let audioElement = null;

// ═══════════════════════════════════════════════════════════════
//  INDEXEDDB — Persist library
// ═══════════════════════════════════════════════════════════════
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('books')) {
        const store = db.createObjectStore('books', { keyPath: 'id' });
        store.createIndex('title', 'title', { unique: false });
        store.createIndex('addedAt', 'addedAt', { unique: false });
      }
      if (!db.objectStoreNames.contains('pdfData')) {
        db.createObjectStore('pdfData', { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAllBooks() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('books', 'readonly');
    const store = tx.objectStore('books');
    const req = store.index('addedAt').openCursor(null, 'prev');
    const books = [];
    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) { books.push(cursor.value); cursor.continue(); }
      else resolve(books);
    };
    req.onerror = () => reject(req.error);
  });
}

async function dbSaveBook(book) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(['books', 'pdfData'], 'readwrite');
    tx.objectStore('books').put(book);
    if (book.pdfData) tx.objectStore('pdfData').put({ id: book.id, data: book.pdfData });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDeleteBook(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(['books', 'pdfData'], 'readwrite');
    tx.objectStore('books').delete(id);
    tx.objectStore('pdfData').delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbGetPdfData(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('pdfData', 'readonly');
    const req = tx.objectStore('pdfData').get(id);
    req.onsuccess = () => resolve(req.result?.data || null);
    req.onerror = () => reject(req.error);
  });
}

// ═══════════════════════════════════════════════════════════════
//  BOOKSHELF UI
// ═══════════════════════════════════════════════════════════════
async function renderBookshelf() {
  const books = await dbGetAllBooks();
  const shelf = document.getElementById('bookshelf');
  const empty = document.getElementById('emptyLibrary');
  
  if (books.length === 0) {
    shelf.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  shelf.innerHTML = books.map(b => {
    const pct = b.progress?.currentIdx > 0 && b.segments ? 
      Math.round((b.progress.currentIdx / b.segments) * 100) : 0;
    const hasProgress = pct > 0;
    return `<div class="book-card" onclick="openBook('${b.id}')">
      <div class="icon"><i class="fas fa-file-pdf"></i></div>
      <div class="title">${escapeHtml(b.title)}</div>
      <div class="meta">
        ${b.source === 'gdrive' ? '<span class="source-badge">☁️Drive</span>' : '<span class="source-badge">📂本機</span>'}
        ${hasProgress ? `<span style="color:var(--accent);font-size:9px;margin-left:4px">${pct}%</span>` : ''}
        ${b.pageCount ? `<span style="margin-left:4px">${b.pageCount}p</span>` : ''}
      </div>
      ${hasProgress ? '<div class="progress-dot"></div>' : ''}
      <div style="font-size:8px;color:var(--muted);margin-top:3px">${fmtDate(b.lastRead)}</div>
    </div>`;
  }).join('');
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return '今天';
  const diff = Math.round((now - d) / 86400000);
  return diff <= 7 ? `${diff}天前` : `${d.getMonth()+1}/${d.getDate()}`;
}

function switchTab(tab) {
  document.getElementById('tabBooks').className = tab === 'books' ? 'tab active' : 'tab';
  document.getElementById('tabDrive').className = tab === 'drive' ? 'tab active' : 'tab';
  document.getElementById('booksContent').style.display = tab === 'books' ? 'block' : 'none';
  document.getElementById('driveContent').style.display = tab === 'drive' ? 'block' : 'none';
}

function showBookshelf() {
  document.getElementById('playerView').style.display = 'none';
  document.getElementById('bookshelfView').style.display = 'block';
  if (state.isPlaying) { SYNTH.cancel(); state.isPlaying = false; }
  stopTTSWatchdog();
  renderBookshelf();
}

// ═══════════════════════════════════════════════════════════════
//  ADD PDFs
// ═══════════════════════════════════════════════════════════════
function addFromFile() {
  document.getElementById('fileInput').click();
}

function addFromUrl() {
  const url = prompt('貼上 PDF 網址 (Google Drive 分享連結或直接 PDF 網址):');
  if (!url) return;
  importFromUrl(url);
}

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  for (const file of files) {
    if (file.type === 'application/pdf') await importFile(file);
  }
  e.target.value = '';
  renderBookshelf();
});

async function importFile(file) {
  showLoading('📖 匯入 ' + file.name);
  const arrayBuffer = await file.arrayBuffer();
  const id = 'book_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const book = {
    id, title: file.name.replace(/\.pdf$/i, ''),
    addedAt: Date.now(), lastRead: Date.now(),
    source: 'local', size: file.size,
    pageCount: 0, progress: { currentIdx: 0, speed: 1.0 },
    pdfData: new Uint8Array(arrayBuffer),
  };
  await dbSaveBook(book);
  hideLoading();
  openBook(id);
}

async function importFromUrl(url) {
  showLoading('🌐 下載中...');
  try {
    // Handle Google Drive share links
    let downloadUrl = url;
    const match = url.match(/drive\.google\.com\/.*[?&]id=([^&#]+)/) || url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
    if (match) {
      const fileId = match[1];
      downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
    }

async function parsePDF(pdf) {
  const totalPages = pdf.numPages;
  let allSegments = [];
  
  for (let i = 1; i <= totalPages; i++) {
    const page = await pdf.getPage(i);
    const textContent = await page.getTextContent();
    
    const lines = [];
    const items = textContent.items;
    let currentLine = { y: -1, text: '' };
    
    for (const item of items) {
      const y = Math.round(item.transform[5] * 10) / 10;
      if (currentLine.y === -1) { currentLine.y = y; currentLine.text = item.str; }
      else if (Math.abs(y - currentLine.y) < 3) {
        currentLine.text += (currentLine.text ? ' ' : '') + item.str;
      } else {
        if (currentLine.text.trim()) lines.push(currentLine.text.trim());
        currentLine = { y, text: item.str };
      }
    }
    if (currentLine.text.trim()) lines.push(currentLine.text.trim());
    
    let paragraphs = lines.join('\n').split(/\n\s*\n/).map(p => p.replace(/\n/g,' ').replace(/\s+/g,' ').trim()).filter(p => p.length > 10);
    if (paragraphs.length < 2) {
      paragraphs = lines.join('\n').split(/(?<=[。！？.!?])\s+/).map(p => p.replace(/\n/g,' ').replace(/\s+/g,' ').trim()).filter(p => p.length > 8);
    }
    
    for (const para of paragraphs) {
      const lang = detectLang(para);
      allSegments.push({ text: para, lang, pageNum: i, chunks: splitByLanguage(para) });
    }
  }
  
  state.segments = allSegments;
  state.currentIdx = 0;
  
  // Update book progress info
  const books = await dbGetAllBooks();
  const book = books.find(b => b.id === state.pdfId);
  if (book) {
    book.segments = allSegments.length;
    book.pageCount = totalPages;
    await dbSaveBook(book);
  }
}

// ═══════════════════════════════════════════════════════════════
//  LANGUAGE & SPLITTER
// ═══════════════════════════════════════════════════════════════
function detectLang(text) {
  const zh = (text.match(/[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/g) || []).length;
  const total = text.replace(/\s/g,'').length;
  return total === 0 ? 'en' : (zh/total > 0.3 ? 'zh' : 'en');
}

function isZH(ch) {
  const c = ch.charCodeAt(0);
  return (c>=0x4E00&&c<=0x9FFF)||(c>=0x3000&&c<=0x303F)||(c>=0xFF00&&c<=0xFFEF)||(c>=0x3100&&c<=0x312F);
}
function isEN(ch) {
  const c = ch.charCodeAt(0);
  return (c>=0x0041&&c<=0x005A)||(c>=0x0061&&c<=0x007A)||(c>=0x0030&&c<=0x0039)||'.,!?\'"-%/()$€&@#*~=:;+°'.includes(ch);
}

function splitByLanguage(text) {
  if (!text) return [];
  const chunks = [];
  let cur = { text: '', lang: null };
  for (const ch of text) {
    const l = isZH(ch) ? 'zh' : isEN(ch) ? 'en' : null;
    if (l !== null) {
      if (cur.lang === null) { cur.lang = l; cur.text = ch; }
      else if (l === cur.lang) cur.text += ch;
      else { if (cur.text.trim()) chunks.push({text:cur.text.trim(),lang:cur.lang}); cur = {text:ch,lang:l}; }
    } else cur.text += ch;
  }
  if (cur.text.trim()) chunks.push({text:cur.text.trim(),lang:cur.lang||'en'});
  // Merge short
  if (chunks.length<=1) return chunks;
  const res = [];
  for (let i=0;i<chunks.length;i++) {
    const raw = chunks[i].text.replace(/\s/g,'');
    if (raw.length<=2 && res.length>0) { res[res.length-1].text += ' '+chunks[i].text; }
    else res.push(chunks[i]);
  }
  return res;
}

async function speakChunk_OpenAI(text, lang) {
  const voice = lang === 'zh' ? state.openaiVoiceZh : state.openaiVoiceEn;
  const key = state.openaiKey;
  
  if (!key) {
    showStatus('⚠️ 請在設定中填入 OpenAI API Key', true);
    return false;
  }
  
  try {
    const resp = await fetch('/api/tts', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-OpenAI-Key': key,
      },
      body: JSON.stringify({
        text: text,
        voice: voice,
        speed: state.speed,
        model: 'tts-1-hd'
      }),
    });
    
    if (!resp.ok) {
      const err = await resp.text();
      showStatus('❌ OpenAI 錯誤: ' + err, true);
      return false;
    }
    
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    
    return new Promise((resolve) => {
      if (audioElement) { audioElement.pause(); audioElement = null; }
      const audio = new Audio(url);
      audioElement = audio;
      audio.onended = () => { URL.revokeObjectURL(url); resolve(true); };
      audio.onerror = () => { URL.revokeObjectURL(url); resolve(false); };
      audio.play().catch(() => resolve(false));
    });
  } catch (e) {
    showStatus('❌ 連線錯誤: ' + e.message, true);
    return false;
  }
}

// ═══════════════════════════════════════════════════════════════
//  TTS — Browser (SpeechSynthesis fallback)
// ═══════════════════════════════════════════════════════════════
function initBrowserVoices() {
  const v = SYNTH.getVoices();
  if (v.length > 0) pickBrowserVoices(v);
  SYNTH.onvoiceschanged = () => pickBrowserVoices(SYNTH.getVoices());
  setTimeout(() => { const w=SYNTH.getVoices(); if(w.length>0) pickBrowserVoices(w); }, 1000);
}

function pickBrowserVoices(voices) {
  state.voices.zh = voices.find(v=>v.lang.startsWith('zh-TW')&&v.localService)||voices.find(v=>v.lang.startsWith('zh-TW'))||voices.find(v=>v.lang.startsWith('zh'))||null;
  state.voices.en = voices.find(v=>v.lang.startsWith('en-US')&&v.name.includes('Premium'))||voices.find(v=>v.lang.startsWith('en-US')&&v.localService)||voices.find(v=>v.lang.startsWith('en-US'))||voices.find(v=>v.lang.startsWith('en'))||null;
  updateVoiceDisplay();
}

function speakChunk_Browser(text, lang) {
  return new Promise((resolve) => {
    SYNTH.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang === 'zh' ? 'zh-TW' : 'en-US';
    u.rate = state.speed;
    u.volume = 1;
    u.voice = lang === 'zh' ? state.voices.zh : state.voices.en;
    u.onend = () => resolve(true);
    u.onerror = () => resolve(false);
    SYNTH.speak(u);
    utterance = u;
    // Fallback polling
    const poll = setInterval(() => {
      if (!SYNTH.speaking && !SYNTH.pending) { clearInterval(poll); resolve(true); }
    }, 2000);
    setTimeout(() => { clearInterval(poll); resolve(true); }, 30000);
  });
}

// ═══════════════════════════════════════════════════════════════
//  PLAYBACK ENGINE
// ═══════════════════════════════════════════════════════════════
async function startChunkQueue() {
  const seg = state.segments[state.currentIdx];
  if (!seg) { finishPlayback(); return; }
  
  state.chunkQueue = (seg.chunks && seg.chunks.length > 0) ? seg.chunks : [{ text: seg.text, lang: seg.lang }];
  state.chunkIdx = 0;
  await speakNextChunk();
}

async function speakNextChunk() {
  while (state.chunkIdx < state.chunkQueue.length) {
    const chunk = state.chunkQueue[state.chunkIdx];
    if (!chunk || !chunk.text.trim()) { state.chunkIdx++; continue; }
    
    updateChunkHighlight(state.currentIdx, state.chunkIdx);
    const label = chunk.lang === 'zh' ? '🇹🇼' : '🇺🇸';
    showStatus(`第 ${state.currentIdx+1}/${state.segments.length} 段 ${label}`);
    
    let ok;
    if (state.ttsEngine === 'openai') {
      ok = await speakChunk_OpenAI(chunk.text, chunk.lang);
    } else {
      ok = await speakChunk_Browser(chunk.text, chunk.lang);
    }
    
    if (!state.isPlaying) return; // paused
    if (!ok) { /* skip */ }
    
    state.chunkIdx++;
    updateProgress();
  }
  
  // All chunks done — next segment
  state.currentIdx++;
  if (state.currentIdx < state.segments.length) {
    await startChunkQueue();
  } else {
    finishPlayback();
  }
}

function finishPlayback() {
  state.isPlaying = false;
  document.getElementById('playIcon').className = 'fas fa-play';
  showStatus('🏁 朗讀完成！');
  releaseWakeLock();
  saveProgress();
}

function startTTSWatchdog() {
  stopTTSWatchdog();
  ttsWatchdog = setInterval(() => {
    if (state.isPlaying && state.ttsEngine === 'browser' && !SYNTH.speaking && !SYNTH.pending) {
      state.chunkIdx++;
      if (state.chunkIdx < state.chunkQueue.length) speakNextChunk();
    }
  }, 500);
}
function stopTTSWatchdog() {
  if (ttsWatchdog) { clearInterval(ttsWatchdog); ttsWatchdog = null; }
}

// ═══════════════════════════════════════════════════════════════
//  PLAYBACK CONTROLS
// ═══════════════════════════════════════════════════════════════
function togglePlay() {
  if (state.segments.length === 0) return;
  if (state.isPlaying) { pausePlayback(); }
  else { startPlayback(); }
}

async function startPlayback() {
  state.isPlaying = true;
  document.getElementById('playIcon').className = 'fas fa-pause';
  
  if (audioElement) { audioElement.play(); }
  else { await startChunkQueue(); }
  
  requestWakeLock();
  startTTSWatchdog();
}

function pausePlayback() {
  state.isPlaying = false;
  document.getElementById('playIcon').className = 'fas fa-play';
  
  if (state.ttsEngine === 'browser') {
    if (SYNTH.speaking && !SYNTH.paused) SYNTH.pause();
  } else {
    if (audioElement) { audioElement.pause(); }
  }
  
  releaseWakeLock();
  stopTTSWatchdog();
}

function stopPlayback() {
  state.isPlaying = false;
  document.getElementById('playIcon').className = 'fas fa-play';
  if (state.ttsEngine === 'browser') SYNTH.cancel();
  else { if (audioElement) { audioElement.pause(); audioElement = null; } }
  releaseWakeLock();
}

function nextSegment() {
  if (state.currentIdx < state.segments.length - 1) {
    state.currentIdx++;
    stopPlayback(); 
    if (state.isPlaying) startChunkQueue();
    else { updateTextHighlight(state.currentIdx); updateProgress(); }
  }
}

function prevSegment() {
  if (state.currentIdx > 0) {
    state.currentIdx--;
    stopPlayback();
    if (state.isPlaying) startChunkQueue();
    else { updateTextHighlight(state.currentIdx); updateProgress(); }
  }
}

function onSpeedChange() {
  state.speed = parseFloat(document.getElementById('speedRange').value);
  document.getElementById('speedDisplay').textContent = state.speed + '×';
}

function seekProgress(e) {
  const rect = document.getElementById('progressContainer').getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const idx = Math.floor(pct * state.segments.length);
  if (idx >= 0 && idx < state.segments.length) {
    state.currentIdx = idx;
    stopPlayback();
    if (state.isPlaying) startChunkQueue();
    else { updateTextHighlight(idx); updateProgress(); }
  }
}

// ═══════════════════════════════════════════════════════════════
//  WAKE LOCK & UI
// ═══════════════════════════════════════════════════════════════
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      state.wakeLock = await navigator.wakeLock.request('screen');
      state.wakeLock.onrelease = () => document.getElementById('wakeLockBadge').className = 'wake-badge';
      document.getElementById('wakeLockBadge').className = 'wake-badge active';
    }
  } catch(e) {}
}
function releaseWakeLock() {
  if (state.wakeLock) { state.wakeLock.release(); state.wakeLock = null; }
}

function showStatus(msg, isError) {
  const el = document.getElementById('statusText');
  el.textContent = msg;
  el.style.color = isError ? '#ef4444' : 'var(--muted)';
}

function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function updateProgress() {
  const total = state.segments.length;
  const cur = state.currentIdx + 1;
  const pct = total > 0 ? (state.currentIdx / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('currentPos').textContent = `第 ${cur} 段 / 共 ${total} 段`;
  
  let rem = 0;
  for (let i = state.currentIdx; i < total; i++) rem += state.segments[i].text.length;
  const est = Math.round(rem / (state.speed * 10));
  document.getElementById('timeRemain').textContent = `剩餘 ${Math.floor(est/60)}:${String(est%60).padStart(2,'0')}`;
}

function updateTextHighlight(idx) {
  const c = document.getElementById('textContent');
  let html = '';
  state.segments.forEach((seg, i) => {
    const act = i === idx;
    const m = act ? '▶ ' : '';
    if (seg.chunks && seg.chunks.length > 1) {
      let ih = m;
      seg.chunks.forEach(ch => { ih += `<span class="${ch.lang==='zh'?'zh-text':'en-text'}">${escapeHtml(ch.text)}</span> `; });
      html += `<div class="para ${act?'active':''}">${ih}</div>`;
    } else {
      const lc = seg.lang === 'zh' ? 'zh-text' : 'en-text';
      html += `<div class="para ${act?'active':''}"><span class="${lc}">${m}${escapeHtml(seg.text)}</span></div>`;
    }
  });
  c.innerHTML = html;
  const cur = c.querySelector('.active');
  if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateChunkHighlight(segIdx, chunkIdx) {
  updateProgress();
  const c = document.getElementById('textContent');
  let html = '';
  state.segments.forEach((seg, i) => {
    const act = i === segIdx;
    const m = act ? '▶ ' : '';
    if (seg.chunks && seg.chunks.length > 1) {
      let ih = m;
      seg.chunks.forEach((ch, ci) => {
        const lc = ch.lang === 'zh' ? 'zh-text' : 'en-text';
        const sp = act && ci === chunkIdx ? 'speaking-chunk' : '';
        ih += `<span class="${lc} sub-chunk ${sp}">${escapeHtml(ch.text)}</span> `;
      });
      html += `<div class="para ${act?'active':''}">${ih}</div>`;
    } else {
      const lc = seg.lang === 'zh' ? 'zh-text' : 'en-text';
      const sp = act ? 'speaking-chunk' : '';
      html += `<div class="para ${act?'active':''}"><span class="${lc} ${sp}">${m}${escapeHtml(seg.text)}</span></div>`;
    }
  });
  c.innerHTML = html;
  const cur = c.querySelector('.active');
  if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderSegments() {
  updateProgress();
  updateTextHighlight(state.currentIdx);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════════════
//  SAVE PROGRESS
// ═══════════════════════════════════════════════════════════════
async function saveProgress() {
  if (!state.pdfId || state.segments.length === 0) return;
  const books = await dbGetAllBooks();
  const book = books.find(b => b.id === state.pdfId);
  if (book) {
    book.lastRead = Date.now();
    book.progress = { currentIdx: state.currentIdx, speed: state.speed };
    await dbSaveBook(book);
  }
}

setInterval(() => {
  if (state.pdfId && state.segments.length > 0) saveProgress();
}, 10000);

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && document.getElementById('playerView').style.display !== 'none') {
    e.preventDefault(); togglePlay();
  }
});

// Preload last file hint from old storage
try {
  const saved = JSON.parse(localStorage.getItem('pdf_reader_state'));
  if (saved?.pdfName) showStatus(`📌 上次: ${saved.pdfName}`);
} catch {}

console.log('📖 語音書 v3 — 書庫 + AI 高品質朗讀');
</script>
</body>
